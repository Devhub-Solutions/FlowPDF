name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const image = process.env.IMAGE || "${{ env.IMAGE }}";
            const packageName = image.split('/').pop().toLowerCase();
            const owner = context.repo.owner;

            try {
              const { data: ownerData } = await github.rest.users.getByUsername({
                username: owner
              });

              if (ownerData.type === 'Organization') {
                await github.rest.packages.updatePackageForOrg({
                  package_type: 'container',
                  package_name: packageName,
                  org: owner,
                  visibility: 'public',
                });
              } else {
                await github.rest.packages.updatePackageForAuthenticatedUser({
                  package_type: 'container',
                  package_name: packageName,
                  visibility: 'public',
                });
              }

              console.log(`Package '${packageName}' visibility set to public.`);
            } catch (error) {
              core.setFailed(`Failed to set package visibility: ${error.message}`);
            }
